spring:
  application:
    name: wordplay-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Supabase Transaction Pooler 사용 시 필수:
  #   prepareThreshold=0   (prepared statement 비활성)
  #   channelBinding=disable (JDBC SCRAM-SHA-256 인증 호환)
  #   sslmode=require
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wordplay?prepareThreshold=0}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# CORS 허용 origin (쉼표 구분, 환경변수로 오버라이드 가능)
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  game:
    id-length: 8
    max-word-length: 20
  wordsim:
    # WordSim 참고용 벡터 사전 위치 (rank 비교 기준)
    vectors-path: ${WORDSIM_VECTORS_PATH:/etc/wordplay/word_vectors.bin}
  openai:
    # OpenAI Embeddings API 키 (사전에 없는 단어 동적 임베딩용)
    # 비어있으면 사전 단어만 사용 가능
    api-key: ${OPENAI_API_KEY:}
    timeout-ms: 10000

---
# 로컬 개발 프로필
spring:
  config:
    activate:
      on-profile: local

# 운영 프로필 (Oracle Cloud)
# Next.js와 Spring Boot가 같은 서버에서 돌고, nginx가 프론트로 받아서
# /api/*만 Next.js → Spring Boot로 internal rewrite. 즉 same-origin 통신.
---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
app:
  cookie:
    secure: true        # HTTPS 전제
    same-site: Lax      # same-origin이라 Lax로 충분 (Strict는 OAuth류에서 깨질 수 있음)
logging:
  level:
    root: INFO
    com.wordplay: INFO
    org.hibernate.SQL: WARN
